name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC (Trusted Publishers — no long-lived token needed)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "tanmaythaker09@gmail.com"
          git config user.name "TanmayThaker"
          git remote add space https://TanmayThaker:$HF_TOKEN@huggingface.co/spaces/tanmayAI/omr_eval
          git push space feature/hf-spaces-deploy:main --force
